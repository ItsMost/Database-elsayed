<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13151f" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>
    <filter id="glow_cyan">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow_gold">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#3b82f6" stroke-width="6" opacity="0.2"/>

  <ellipse cx="256" cy="180" rx="130" ry="40" fill="#60a5fa" filter="url(#glow_cyan)"/>
  <ellipse cx="256" cy="240" rx="130" ry="40" fill="#3b82f6" filter="url(#glow_cyan)" opacity="0.8"/>
  <ellipse cx="256" cy="300" rx="130" ry="40" fill="#2563eb" filter="url(#glow_cyan)" opacity="0.6"/>

  <text x="256" y="270" font-family="'Cairo', sans-serif" font-size="200" font-weight="700" fill="#f59e0b" filter="url(#glow_gold)" text-anchor="middle" dominant-baseline="middle">$</text>
</svg>
